services:
  brief-api:
    build: ./brief-api
    env_file: .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/rmbrief
      SPRING_DATASOURCE_USERNAME: rm
      SPRING_DATASOURCE_PASSWORD: rm
      SPRING_DATA_REDIS_HOST: redis
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: on-failure

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: rmbrief
      POSTGRES_USER: rm
      POSTGRES_PASSWORD: rm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rm -d rmbrief"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata: {}
